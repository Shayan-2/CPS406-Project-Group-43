{% extends 'base.html' %}
{% block content %}
<div class="card">
  <h2>Log In</h2>
  <form method="post">
    <label for="username">Username</label>
    <input id="username" name="username" required>

    <label for="password">Password</label>
    <input id="password" name="password" type="password" required>

    <button type="submit">Log In</button>
  </form>
</div>
{% endblock %}
