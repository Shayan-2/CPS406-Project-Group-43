{% extends 'base.html' %}
{% block content %}
<div class="card">
  <h2>Browse Jobs</h2>
  <form method="get">
    <label for="q">Search title/description/requirements</label>
    <input id="q" name="q" value="{{ q }}">
    <button type="submit">Search</button>
  </form>
</div>

{% for job in jobs %}
<div class="card">
  <h3>{{ job.title }}</h3>
  <p><strong>Recruiter:</strong> {{ job.recruiter_name }}</p>
  <p><strong>Deadline:</strong> {{ job.deadline }}</p>
  <p>{{ job.description }}</p>
  <p><strong>Requirements:</strong> {{ job.requirements }}</p>
  <form method="post" action="{{ url_for('apply_job', job_id=job.id) }}">
    <label for="cover_letter_{{ job.id }}">Cover Letter</label>
    <textarea id="cover_letter_{{ job.id }}" name="cover_letter"></textarea>

    <label for="transcript_notes_{{ job.id }}">Transcript Notes</label>
    <textarea id="transcript_notes_{{ job.id }}" name="transcript_notes"></textarea>

    <button type="submit">Apply</button>
  </form>
</div>
{% else %}
<div class="card"><p>No jobs found.</p></div>
{% endfor %}
{% endblock %}
